<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumeow 聊天树分支 Demo</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #1d1d1f;
      --bg-deep: #171719;
      --surface: #29292b;
      --surface-soft: rgba(255, 255, 255, 0.035);
      --surface-card: rgba(42, 42, 44, 0.7);
      --border: rgba(255, 255, 255, 0.08);
      --border-strong: rgba(255, 255, 255, 0.14);
      --text: #f7f7f8;
      --text-secondary: #c8c8cc;
      --text-muted: #98989f;
      --blue: #1e9bff;
      --blue-soft: rgba(30, 155, 255, 0.18);
      --green: #3bd36f;
      --purple: #8f82f7;
      --memory-short: #8b6cff;
      --memory-long: #56c8f5;
      --memory-permanent: #f6b51e;
      --edge: #4b4c50;
      --edge-active: #8f82f7;
      --tree-zoom: 1;
      --radius-card: 28px;
      --shadow-card: 0 30px 80px -42px rgba(0, 0, 0, 0.9), 0 0 0 1px rgba(255, 255, 255, 0.04) inset;
      --motion-spring: cubic-bezier(0.18, 0.92, 0.22, 1);
      --motion-soft: cubic-bezier(0.22, 1, 0.36, 1);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button {
      padding: 0;
      border: 0;
      font: inherit;
      color: inherit;
      background: transparent;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .tree-modal {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-rows: 52px minmax(0, 1fr);
      overflow: hidden;
      isolation: isolate;
      background: var(--bg) url("assets/lumeow-chat-background.svg") center / cover no-repeat;
    }

    .tree-modal::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: max(1168px, 100vw);
      height: max(900px, 100vh);
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.85);
      background-blend-mode: multiply;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      pointer-events: none;
      z-index: 0;
    }

    .topbar {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 30px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.075);
      color: var(--text-muted);
    }

    .close-button {
      position: relative;
      width: 22px;
      height: 22px;
      opacity: 0.82;
    }

    .close-button::before,
    .close-button::after {
      content: "";
      position: absolute;
      left: 10px;
      top: 2px;
      width: 1.5px;
      height: 18px;
      border-radius: 999px;
      background: currentColor;
    }

    .close-button::before {
      transform: rotate(45deg);
    }

    .close-button::after {
      transform: rotate(-45deg);
    }

    .top-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      letter-spacing: 0;
      opacity: 0.42;
      transition: opacity 160ms ease;
    }

    .top-meta:hover,
    .top-meta:focus-within {
      opacity: 0.9;
    }

    .zoom-controls {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px;
      border: 1px solid rgba(255, 255, 255, 0.055);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.018);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .zoom-button,
    .zoom-value {
      height: 30px;
      min-width: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      color: rgba(247, 247, 248, 0.66);
      font-size: 13px;
      font-weight: 650;
      line-height: 1;
    }

    .zoom-button {
      border: 1px solid transparent;
      background: transparent;
      transition: background 160ms ease, color 160ms ease, opacity 160ms ease;
    }

    .zoom-button:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.055);
    }

    .zoom-value {
      min-width: 48px;
      color: rgba(247, 247, 248, 0.7);
      font-variant-numeric: tabular-nums;
      pointer-events: none;
    }

    .legend {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      color: var(--text-muted);
      font-size: 12px;
      line-height: 16px;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
    }

    .legend i {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--blue);
      box-shadow: 0 0 16px rgba(30, 155, 255, 0.62);
    }

    .legend .memory i {
      background: #8f8f95;
      box-shadow: 0 0 14px rgba(255, 255, 255, 0.28);
    }

    .legend .current i {
      background: var(--green);
      box-shadow: 0 0 16px rgba(59, 211, 111, 0.54);
    }

    .graph-stage {
      position: relative;
      z-index: 1;
      min-height: 0;
      overflow: hidden;
    }

    .graph-viewport {
      position: absolute;
      inset: 0;
      overflow: auto;
      cursor: grab;
      overscroll-behavior: contain;
      scrollbar-width: none;
      touch-action: none;
    }

    .graph-viewport::-webkit-scrollbar {
      display: none;
    }

    .graph-viewport.is-panning {
      cursor: grabbing;
      user-select: none;
    }

    .graph-canvas {
      position: relative;
      width: 1200px;
      min-width: 1200px;
      height: 720px;
      min-height: 650px;
      margin: 28px auto 12px;
    }

    .graph-content {
      position: absolute;
      left: 0;
      top: 0;
      width: 1200px;
      height: 720px;
      transform: scale(var(--tree-zoom));
      transform-origin: 0 0;
      will-change: transform;
    }

    .edge-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: visible;
    }

    .edge {
      fill: none;
      stroke: var(--edge);
      stroke-width: 1.45;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 6 9;
      opacity: 1;
    }

    .edge.active {
      stroke: var(--edge-active);
      stroke-width: 1.9;
      stroke-dasharray: none;
      opacity: 1;
      filter: drop-shadow(0 0 8px rgba(143, 130, 247, 0.32));
    }

    .edge.active.path-kick {
      animation: active-path-kick 680ms var(--motion-soft);
    }

    .edge-flow {
      fill: none;
      stroke: rgba(193, 186, 255, 0.95);
      stroke-width: 2.4;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 14 64;
      opacity: 0.9;
      animation: dash-flow 1.2s linear infinite;
      filter: drop-shadow(0 0 8px rgba(143, 130, 247, 0.42));
      pointer-events: none;
    }

    @keyframes dash-flow {
      to {
        stroke-dashoffset: -78;
      }
    }

    @keyframes active-path-kick {
      0% {
        stroke-width: 1.4;
        opacity: 0.45;
        filter: drop-shadow(0 0 0 rgba(143, 130, 247, 0));
      }

      42% {
        stroke-width: 2.7;
        opacity: 1;
        filter: drop-shadow(0 0 14px rgba(143, 130, 247, 0.56));
      }

      100% {
        stroke-width: 1.9;
        opacity: 1;
        filter: drop-shadow(0 0 8px rgba(143, 130, 247, 0.32));
      }
    }

    .chat-node {
      position: absolute;
      left: calc(var(--x) * 1px);
      top: calc(var(--y) * 1px);
      width: 56px;
      height: 56px;
      transform: translate(-50%, -50%) scale(var(--node-scale, 1));
      border: 2px solid rgba(143, 130, 247, 0.86);
      border-radius: 999px;
      background-color: rgba(46, 38, 96, 0.54);
      background-clip: padding-box;
      background-position: center;
      background-repeat: no-repeat;
      background-size: contain;
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(143, 130, 247, 0.08), 0 0 15px rgba(143, 130, 247, 0.26);
      opacity: var(--node-opacity, 1);
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease, opacity 160ms ease, filter 160ms ease;
      will-change: transform, opacity;
      z-index: 2;
    }

    .chat-node.user {
      background-image: url("assets/lumeow-user-avatar.png");
      background-position: center;
      background-size: contain;
    }

    .chat-node.assistant {
      background-image: url("assets/lumeow-cat-avatar.png");
      background-position: center;
      background-size: contain;
    }

    .chat-node:hover,
    .chat-node:focus-visible {
      outline: none;
      --node-scale: 1.14;
      border-color: rgba(173, 163, 255, 1);
      box-shadow: 0 0 0 6px rgba(143, 130, 247, 0.13), 0 0 26px rgba(143, 130, 247, 0.52);
      z-index: 4;
    }

    .chat-node.inactive {
      --node-opacity: 0.2;
      border-color: rgba(90, 101, 111, 0.8);
      box-shadow: none;
      filter: none;
    }

    .chat-node.memory {
      border-color: rgba(164, 176, 187, 0.82);
    }

    .chat-node.memory-short {
      box-shadow: 0 0 13px rgba(139, 108, 255, 0.33);
    }

    .chat-node.memory-long {
      box-shadow: 0 0 13px rgba(86, 200, 245, 0.28);
    }

    .chat-node.memory-permanent {
      box-shadow: 0 0 13px rgba(246, 181, 30, 0.3);
    }

    .chat-node.current {
      border-color: rgba(83, 226, 127, 1);
      filter: none;
      --node-opacity: 1;
      box-shadow: 0 0 0 6px rgba(59, 211, 111, 0.12), 0 0 28px rgba(59, 211, 111, 0.52);
      z-index: 5;
    }

    .chat-node.selected {
      border-color: rgba(143, 130, 247, 1);
      box-shadow: 0 0 0 6px rgba(143, 130, 247, 0.12), 0 0 26px rgba(143, 130, 247, 0.5);
      z-index: 6;
    }

    .chat-node.selection-pop {
      animation: node-selection-pop 520ms var(--motion-spring);
    }

    @keyframes node-selection-pop {
      0% {
        transform: translate(-50%, -50%) scale(0.82);
        box-shadow: 0 0 0 0 rgba(143, 130, 247, 0);
      }

      55% {
        transform: translate(-50%, -50%) scale(1.2);
        box-shadow: 0 0 0 10px rgba(143, 130, 247, 0.14), 0 0 34px rgba(143, 130, 247, 0.58);
      }

      100% {
        transform: translate(-50%, -50%) scale(1);
      }
    }

    .message-card {
      position: absolute;
      left: max(24px, env(safe-area-inset-left));
      right: max(24px, env(safe-area-inset-right));
      bottom: max(24px, env(safe-area-inset-bottom));
      z-index: 20;
      max-width: 880px;
      margin-inline: auto;
      display: grid;
      grid-template-columns: 40px minmax(0, 1fr);
      gap: 14px;
      min-height: 120px;
      padding: 22px 24px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.075);
      border-radius: 28px;
      background: rgba(24, 24, 27, 0.8);
      box-shadow: 0 30px 90px -52px rgba(0, 0, 0, 0.95), 0 1px 0 rgba(255, 255, 255, 0.045) inset;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      will-change: transform, opacity;
    }

    .message-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.035), rgba(255, 255, 255, 0) 46%);
      pointer-events: none;
    }

    .message-card__avatar,
    .message-card__body {
      position: relative;
      z-index: 1;
    }

    .message-card__avatar {
      width: 40px;
      height: 40px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 999px;
      background-color: rgba(255, 255, 255, 0.04);
      background-position: center;
      background-repeat: no-repeat;
      background-size: contain;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
    }

    .message-card__avatar.user {
      background-image: url("assets/lumeow-user-avatar.png");
    }

    .message-card__avatar.assistant {
      background-image: url("assets/lumeow-cat-avatar.png");
    }

    .message-card__body {
      min-width: 0;
    }

    .message-card__meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 10px;
      min-width: 0;
    }

    .message-card__name {
      margin: 0;
      color: rgba(255, 255, 255, 0.95);
      font-size: 20px;
      font-weight: 780;
      line-height: 1.2;
    }

    .message-card__count {
      flex: none;
      padding: 4px 8px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      color: rgba(232, 232, 235, 0.62);
      background: rgba(255, 255, 255, 0.035);
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
    }

    .message-card__text {
      margin: 0;
      max-width: 1180px;
      color: rgba(232, 232, 235, 0.86);
      font-size: 16px;
      font-weight: 400;
      line-height: 1.65;
      white-space: pre-line;
      word-break: break-word;
    }

    .tooltip {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 60;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      width: max-content;
      max-width: min(420px, calc(100vw - 24px));
      padding: 18px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      background: rgba(22, 22, 25, 0.88);
      box-shadow: 0 24px 80px -36px rgba(0, 0, 0, 0.95), 0 0 0 1px rgba(143, 130, 247, 0.08) inset;
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      opacity: 0;
      transform: translateY(4px);
      pointer-events: none;
      transition: opacity 130ms ease, transform 130ms ease;
      will-change: transform, opacity;
    }

    .tooltip.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .tooltip__avatar {
      flex: none;
      width: 32px;
      height: 32px;
      border-radius: 999px;
      background-color: rgba(46, 38, 96, 0.5);
      background-position: center;
      background-repeat: no-repeat;
      background-size: contain;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.12) inset;
    }

    .tooltip__avatar.user {
      background-image: url("assets/lumeow-user-avatar.png");
    }

    .tooltip__avatar.assistant {
      background-image: url("assets/lumeow-cat-avatar.png");
    }

    .tooltip__content {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 320px;
      min-width: 0;
      word-break: break-word;
    }

    .tooltip__label {
      color: #ffffff;
      font-size: 20px;
      font-weight: 700;
      line-height: 1.2;
    }

    .tooltip__body {
      color: rgba(232, 232, 235, 0.78);
      font-size: 16px;
      font-weight: 400;
      line-height: 1.5;
      white-space: pre-line;
    }

    .tooltip__anchor {
      align-self: flex-start;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 30px;
      margin-top: 2px;
      padding: 6px 10px;
      border: 1px solid rgba(143, 130, 247, 0.26);
      border-radius: 999px;
      color: rgba(255, 255, 255, 0.9);
      background: rgba(143, 130, 247, 0.12);
      font-size: 12px;
      font-weight: 720;
      line-height: 1;
      transition: background 160ms ease, border-color 160ms ease, transform 160ms ease;
    }

    .tooltip__anchor::after {
      content: "↗";
      color: rgba(193, 186, 255, 0.92);
      font-size: 12px;
      line-height: 1;
    }

    .tooltip__anchor:hover,
    .tooltip__anchor:focus-visible {
      outline: none;
      border-color: rgba(143, 130, 247, 0.48);
      background: rgba(143, 130, 247, 0.2);
      transform: translateY(-1px);
    }

    .tooltip__arrow {
      position: absolute;
      width: 10px;
      height: 10px;
      background: rgba(22, 22, 25, 0.88);
      transform: rotate(45deg);
      pointer-events: none;
    }

    .tooltip__arrow.is-top {
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .tooltip__arrow.is-bottom {
      border-left: 1px solid rgba(255, 255, 255, 0.08);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .toast {
      position: fixed;
      right: 28px;
      top: 68px;
      max-width: 360px;
      padding: 12px 14px;
      border: 1px solid rgba(30, 155, 255, 0.2);
      border-radius: 14px;
      color: var(--text-secondary);
      background: rgba(32, 32, 34, 0.92);
      box-shadow: 0 20px 60px -30px rgba(0, 0, 0, 0.9);
      opacity: 0;
      transform: translateY(-8px);
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
      font-size: 12px;
      line-height: 1.55;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 900px) {
      .tree-modal {
        grid-template-rows: 46px minmax(0, 1fr);
      }

      .topbar {
        padding: 0 12px 0 16px;
      }

      .legend {
        display: none;
      }

      .top-meta {
        opacity: 0.34;
      }

      .zoom-controls {
        gap: 1px;
        padding: 3px;
      }

      .zoom-button,
      .zoom-value {
        height: 26px;
        min-width: 26px;
        font-size: 11px;
      }

      .zoom-value {
        min-width: 40px;
      }

      .graph-canvas {
        min-width: 0;
        min-height: 0;
        margin: 16px 14px 20px;
      }

      .edge-svg {
        width: 100%;
        height: 100%;
      }

      .chat-node {
        width: 52px;
        height: 52px;
      }

      .message-card {
        left: 12px;
        right: 12px;
        bottom: 12px;
        grid-template-columns: 40px minmax(0, 1fr);
        gap: 12px;
        min-height: 110px;
        padding: 18px;
        border-radius: 24px;
      }

      .message-card__avatar {
        width: 40px;
        height: 40px;
      }

      .message-card__name {
        font-size: 17px;
      }

      .message-card__count {
        font-size: 11px;
      }

      .message-card__text {
        font-size: 14px;
        line-height: 1.58;
      }

    }

    @media (max-width: 480px) {
      .tree-modal {
        grid-template-rows: 44px minmax(0, 1fr);
      }

      .zoom-value {
        min-width: 34px;
      }

      .zoom-button:last-child {
        display: none;
      }

      .message-card {
        left: 10px;
        right: 10px;
        bottom: 10px;
        grid-template-columns: 40px minmax(0, 1fr);
        gap: 10px;
        min-height: 96px;
        max-height: 34vh;
        padding: 14px;
        overflow-y: auto;
      }

      .message-card__avatar {
        width: 40px;
        height: 40px;
      }

      .message-card__name {
        font-size: 16px;
      }

      .message-card__text {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <main class="tree-modal" aria-label="Lumeow 聊天树分支地图 Demo">
    <header class="topbar">
      <button class="close-button" type="button" aria-label="关闭聊天树"></button>
      <div class="top-meta" aria-label="缩放控制">
        <div class="zoom-controls">
          <button class="zoom-button" type="button" id="zoomOutBtn" aria-label="缩小">−</button>
          <span class="zoom-value" id="zoomValue">100%</span>
          <button class="zoom-button" type="button" id="zoomInBtn" aria-label="放大">+</button>
          <button class="zoom-button" type="button" id="zoomResetBtn" aria-label="重置缩放">1:1</button>
        </div>
      </div>
    </header>

    <section class="graph-stage" aria-label="聊天树地图">
      <div class="graph-viewport" id="graphViewport">
        <div class="graph-canvas" id="graphCanvas">
          <div class="graph-content" id="graphContent">
            <svg class="edge-svg" id="edgeSvg" viewBox="0 0 1200 720" aria-hidden="true"></svg>
            <div id="nodeLayer"></div>
          </div>
        </div>
      </div>
      <aside class="message-card" id="messageCard" aria-label="当前选中节点的消息">
        <span class="message-card__avatar" id="messageAvatar" aria-hidden="true"></span>
        <div class="message-card__body">
          <div class="message-card__meta">
            <h2 class="message-card__name" id="messageName"></h2>
            <span class="message-card__count" id="messageCount"></span>
          </div>
          <p class="message-card__text" id="messageText"></p>
        </div>
      </aside>
    </section>
  </main>
  <div class="tooltip" id="tooltip" role="tooltip" aria-hidden="true">
    <span class="tooltip__avatar" id="tooltipAvatar"></span>
    <span class="tooltip__content">
      <span class="tooltip__label" id="tooltipLabel"></span>
      <span class="tooltip__body" id="tooltipBody"></span>
      <button class="tooltip__anchor" id="tooltipAnchorBtn" type="button">查看消息</button>
    </span>
    <i class="tooltip__arrow" id="tooltipArrow"></i>
  </div>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script>
    const nodes = {

        },
        {
          parent: "long81",
          branches: [
            ["叫醒小猫", "我要不要叫醒角落那只小猫？", "露喵摇头：可以，但它醒来以后会把路线改写成另一种心情。"],
            ["绕过水洼", "我绕过水洼，不踩进去。", "水洼里倒映出另一条旁支的影子。"],
            ["靠近窗边", "我靠近窗边看看外面。", "窗外不是夜色，是这段会话滚动到很后面的样子。"]
          ]
        },
        {
          parent: "long94",
          branches: [
            ["最后确认", "我想在结束前确认一次当前选择。", "露喵说：确认会把这条路钉住，但不会锁死其他可能。"],
            ["存档节点", "把这里当成一个存档点吧。", "这一刻被轻轻折起，放进了当前路径的口袋里。"],
            ["临时岔路", "我想临时试一条岔路，但不改变主线。", "露喵眨眼：那就走近看看，回来时主线还在原地。"]
          ]
        }
      ];

      branchSpecs.forEach((spec) => {
        spec.branches.forEach((branch, branchIndex) => {
          const [title, firstText, secondText] = branch;
          const side = branchIndex - (spec.branches.length - 1) / 2;
          const rootId = `${spec.parent}-branch-${branchIndex + 1}`;
          const secondId = `${rootId}-reply`;
          const thirdId = `${rootId}-settle`;
          const firstType = nodes[spec.parent].type === "user" ? "assistant" : "user";
          const secondType = firstType === "user" ? "assistant" : "user";
          const thirdType = secondType === "user" ? "assistant" : "user";
          nodes[rootId] = {
            id: rootId,
            parent: spec.parent,
            type: firstType,
            title,
            text: firstText,
            branchRoot: true,
            branchGroupParent: spec.parent,
            order: side || branchIndex + 1
          };
          nodes[secondId] = {
            id: secondId,
            parent: rootId,
            type: secondType,
            title: `${title}回应`,
            text: secondText,
            branchGroupParent: spec.parent,
            order: 0
          };
          nodes[thirdId] = {
            id: thirdId,
            parent: secondId,
            type: thirdType,
            title: `${title}收束`,
            text: "这条临时分支在这里收束，主线仍然停在原来的纵向路径上。",
            branchGroupParent: spec.parent,
            order: 0
          };
        });
      });
    }

    buildLongConversationExample();

    // Fixed spine used ONLY for layout (keeps the centre line straight and the
    // node positions stable). It never changes, so clicking a node only updates
    // highlighting — no node ever shifts position.
    const layoutSpineLeafId = "long100";
    let activeLeafId = "long100";
    let selectedNodeId = "long100";
    let layout = { positions: {}, width: 1200, height: 720 };
    let treeZoom = 1;
    let initialZoomApplied = false;
    let userChangedZoom = false;
    let panGesture = null;
    let tooltipHideTimer = null;
    const motion = {
      enabled: Boolean(window.gsap) && !window.matchMedia("(prefers-reduced-motion: reduce)").matches,
      initialized: false,
      previousVisibleIds: new Set(),
      previousActiveIds: new Set(),
      previousSelectedId: selectedNodeId,
      pending: { type: "initial" }
    };
    const graphCanvas = document.getElementById("graphCanvas");
    const graphContent = document.getElementById("graphContent");
    const nodeLayer = document.getElementById("nodeLayer");
    const edgeSvg = document.getElementById("edgeSvg");
    const viewport = document.getElementById("graphViewport");
    const tooltip = document.getElementById("tooltip");
    const tooltipAvatar = document.getElementById("tooltipAvatar");
    const tooltipLabel = document.getElementById("tooltipLabel");
    const tooltipBody = document.getElementById("tooltipBody");
    const tooltipArrow = document.getElementById("tooltipArrow");
    const tooltipAnchorBtn = document.getElementById("tooltipAnchorBtn");
    const toast = document.getElementById("toast");
    const zoomValue = document.getElementById("zoomValue");
    const messageCard = document.getElementById("messageCard");
    const messageAvatar = document.getElementById("messageAvatar");
    const messageName = document.getElementById("messageName");
    const messageCount = document.getElementById("messageCount");
    const messageText = document.getElementById("messageText");

    if (motion.enabled) {
      gsap.defaults({ duration: 0.42, ease: "power2.out", overwrite: "auto" });
    }

    function childrenOf(id) {
      return Object.values(nodes)
        .filter((node) => node.parent === id)
        .sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
    }

    function visibleNodes() {
      const visible = [];
      function walk(id) {
        const node = nodes[id];
        if (!node) return;
        visible.push(node);
        childrenOf(id).forEach((child) => walk(child.id));
      }
      walk("root");
      return visible;
    }

    function pathToRoot(id) {
      const path = [];
      let node = nodes[id];
      while (node) {
        path.unshift(node.id);
        node = node.parent ? nodes[node.parent] : null;
      }
      return path;
    }

    function activePath() {
      return pathToRoot(activeLeafId);
    }

    function selectedPath() {
      return pathToRoot(selectedNodeId);
    }

    function isOnActivePath(id) {
      return activePath().includes(id);
    }

    function activeMemories() {
      return activePath().map((id) => nodes[id]).filter((node) => node.memory);
    }

    function computeLayout() {
      const levelSpacing = 118;
      const marginX = 96;
      const marginTop = 76;
      const marginBottom = 96;
      const fixedSpineX = 980;
      const positions = {};
      let maxDepth = 0;

      const depthOf = (id) => pathToRoot(id).length - 1;

      // Depth-aware minimum separation: the three mega-branches at the top are
      // pushed far apart, tapering down to a comfortable gap between leaf-level
      // siblings. The avatar is 56px, so even the smallest value clears it.
      function sepFor(depth) {
        if (depth <= 0) return 236; // between the L / M / R mega-branches
        if (depth === 1) return 162;
        if (depth === 2) return 124;
        if (depth === 3) return 108;
        return 100; // small / leaf-level sibling branches
      }

      // Nodes on the fixed layout spine. Using a constant path (not the dynamic
      // active path) makes positions independent of selection, so clicking a
      // node never shifts the layout.
      const activeSet = new Set(pathToRoot(layoutSpineLeafId));

      // Tidy-tree layout via contour merging. Each subtree is laid out on its
      // own, then adjacent sibling subtrees are pushed apart by the minimum
      // amount needed so their facing contours never get closer than `sep` at
      // ANY depth -> avatar overlap is structurally impossible.
      // For nodes on the active path we anchor the node above its active child
      // (instead of the children's centroid), so the whole spine stays a
      // perfectly straight vertical line.
      function layoutSubtree(id, depth) {
        maxDepth = Math.max(maxDepth, depth);
        const childNodes = childrenOf(id);
        if (!childNodes.length) {
          return { rootX: 0, x: { [id]: 0 }, left: [0], right: [0] };
        }

        const sep = sepFor(depth);
        const subs = childNodes.map((child) => layoutSubtree(child.id, depth + 1));
        const offsets = [];
        let accumRight = null;

        subs.forEach((sub, index) => {
          if (index === 0) {
            offsets.push(0);
            accumRight = sub.right.slice();
            return;
          }
          let need = accumRight[0] + sep - sub.left[0];
          const shared = Math.min(accumRight.length, sub.left.length);
          for (let d = 0; d < shared; d += 1) {
            need = Math.max(need, accumRight[d] + sep - sub.left[d]);
          }
          offsets.push(need);
          for (let d = 0; d < sub.right.length; d += 1) {
            const value = sub.right[d] + need;
            if (d < accumRight.length) accumRight[d] = value;
            else accumRight.push(value);
          }
        });

        const childRootXs = subs.map((sub, index) => sub.rootX + offsets[index]);
        const spineIndex = activeSet.has(id)
          ? childNodes.findIndex((child) => activeSet.has(child.id))
          : -1;
        let rootX = spineIndex >= 0
          ? childRootXs[spineIndex]
          : (childRootXs[0] + childRootXs[childRootXs.length - 1]) / 2;

        const x = { [id]: rootX };
        const left = [];
        const right = [];
        subs.forEach((sub, index) => {
          const offset = offsets[index];
          Object.keys(sub.x).forEach((key) => {
            x[key] = sub.x[key] + offset;
          });
          for (let d = 0; d < sub.left.length; d += 1) {
            const lv = sub.left[d] + offset;
            const rv = sub.right[d] + offset;
            if (d >= left.length) {
              left[d] = lv;
              right[d] = rv;
            } else {
              left[d] = Math.min(left[d], lv);
              right[d] = Math.max(right[d], rv);
            }
          }
        });

        if (spineIndex >= 0) {
          const normalizeBy = childRootXs[spineIndex];
          Object.keys(x).forEach((key) => {
            x[key] -= normalizeBy;
          });
          for (let d = 0; d < left.length; d += 1) {
            left[d] -= normalizeBy;
            right[d] -= normalizeBy;
          }
          rootX = 0;
        }

        return { rootX, x, left: [rootX, ...left], right: [rootX, ...right] };
      }

      const tree = layoutSubtree("root", 0);
      Object.keys(tree.x).forEach((id) => {
        positions[id] = {
          x: tree.x[id] + fixedSpineX,
          y: marginTop + depthOf(id) * levelSpacing
        };
      });

      const minX = Math.min(...Object.values(positions).map((position) => position.x));
      const maxX = Math.max(...Object.values(positions).map((position) => position.x));
      const width = Math.max(1200, maxX + marginX, fixedSpineX + marginX, marginX - minX + fixedSpineX);
      const height = Math.max(650, marginTop + maxDepth * levelSpacing + marginBottom);
      if (!initialZoomApplied && viewport.clientWidth <= 760) {
        treeZoom = clamp((viewport.clientWidth - 28) / width, 0.62, 0.76);
        initialZoomApplied = true;
      } else if (!initialZoomApplied) {
        initialZoomApplied = true;
      }
      const paddingX = Math.max(viewport.clientWidth * 0.55, 320);
      const paddingY = Math.max(viewport.clientHeight * 0.55, 260);
      layout = { positions, width, height, paddingX, paddingY };
      graphCanvas.style.width = `${Math.ceil(width * treeZoom + paddingX * 2)}px`;
      graphCanvas.style.height = `${Math.ceil(height * treeZoom + paddingY * 2)}px`;
      graphContent.style.left = `${paddingX}px`;
      graphContent.style.top = `${paddingY}px`;
      graphContent.style.width = `${width}px`;
      graphContent.style.height = `${height}px`;
      graphContent.style.setProperty("--tree-zoom", String(treeZoom));
      edgeSvg.setAttribute("viewBox", `0 0 ${width} ${height}`);
    }

    function nodePosition(id) {
      return layout.positions[id] || { x: nodes[id].x || 0, y: nodes[id].y || 0 };
    }

    function edgePathBetween(parentPos, childPos, avatarClearance) {
      const startX = parentPos.x;
      const startY = parentPos.y + avatarClearance;
      const endX = childPos.x;
      const endY = childPos.y - avatarClearance;
      const dx = endX - startX;
      const dy = Math.max(1, endY - startY);

      if (Math.abs(dx) < 0.5) {
        return `M ${startX} ${startY} L ${endX} ${endY}`;
      }

      const handleY = clamp(dy * 0.58, 36, 84);
      const handleX = Math.abs(dx) * 0.24 * Math.sign(dx);
      const cp1X = startX + handleX;
      const cp2X = endX - handleX;
      const cp1Y = startY + handleY;
      const cp2Y = endY - handleY;

      return `M ${startX} ${startY} C ${cp1X} ${cp1Y}, ${cp2X} ${cp2Y}, ${endX} ${endY}`;
    }

    function renderEdges() {
      const avatarClearance = 34;
      const activeIds = activePath();
      const activePairs = new Set(activeIds.slice(1).map((id, index) => `${activeIds[index]}->${id}`));
      const inactivePaths = [];
      const activePaths = [];

      visibleNodes().forEach((parent) => {
        const childNodes = childrenOf(parent.id);
        if (!childNodes.length) return;

        const parentPos = nodePosition(parent.id);
        childNodes.forEach((child) => {
          const childPos = nodePosition(child.id);
          const path = edgePathBetween(parentPos, childPos, avatarClearance);
          const active = activePairs.has(`${parent.id}->${child.id}`);
          (active ? activePaths : inactivePaths).push(path);
        });
      });

      const inactivePath = inactivePaths.join(" ");
      const activePathD = activePaths.join(" ");
      edgeSvg.innerHTML = [
        inactivePath ? `<path class="edge" d="${inactivePath}"></path>` : "",
        activePathD ? `<path class="edge active" d="${activePathD}"></path>` : "",
        activePathD ? `<path class="edge-flow" d="${activePathD}"></path>` : ""
      ].join("");
    }

    function renderNodes() {
      const nodeButtons = visibleNodes()
        .map((node) => {
          const classes = [
            "chat-node",
            node.type,
            isOnActivePath(node.id) ? "" : "inactive",
            node.memory ? `memory memory-${node.memory}` : "",
            node.id === activeLeafId ? "current" : "",
            node.id === selectedNodeId ? "selected" : ""
          ].filter(Boolean).join(" ");
          return `
            <button
              class="${classes}"
              type="button"
              style="--x:${nodePosition(node.id).x}; --y:${nodePosition(node.id).y}"
              data-node="${node.id}"
              aria-label="${node.title}"
            ></button>
          `;
        })
        .join("");
      nodeLayer.innerHTML = nodeButtons;
    }

    function speakerName(node) {
      return node.type === "user" ? "铲屎官" : "露喵";
    }

    function escapeHTML(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function dialoguePreview(id) {
      const path = pathToRoot(id);
      const currentIndex = path.indexOf(id);
      const start = Math.max(0, currentIndex - 1);
      return path.slice(start, currentIndex + 1)
        .map((nodeId) => {
          const node = nodes[nodeId];
          return `${speakerName(node)}：${node.text}`;
        })
        .join("\n");
    }

    function messageCountLabel(node) {
      return /^第\s*\d+\s*条$/.test(node.title || "") ? node.title.replace(/\s+/g, " ") : "";
    }

    function messageTextWithoutCount(node) {
      return String(node.text || "").replace(/（第\s*\d+\s*条）\s*$/, "");
    }

    function renderMessageCard() {
      const node = nodes[selectedNodeId] || nodes[activeLeafId] || nodes.root;
      if (!node) return;
      messageAvatar.className = `message-card__avatar ${node.type}`;
      messageName.textContent = speakerName(node);
      messageCount.textContent = messageCountLabel(node);
      messageCount.hidden = !messageCount.textContent;
      messageText.textContent = messageTextWithoutCount(node);
    }

    function setPendingMotion(type, data = {}) {
      motion.pending = { type, ...data };
    }

    function escapedDataSelector(attribute, value) {
      const safeValue = window.CSS?.escape ? CSS.escape(String(value)) : String(value).replace(/"/g, '\\"');
      return `[${attribute}="${safeValue}"]`;
    }

    function animateNodePulse(id) {
      if (!motion.enabled || !id) return;
      const node = nodeLayer.querySelector(escapedDataSelector("data-node", id));
      if (!node) return;
      gsap.killTweensOf(node);
      gsap.fromTo(
        node,
        { "--node-scale": 0.88, filter: "brightness(1.22)" },
        {
          "--node-scale": 1,
          filter: "brightness(1)",
          duration: 0.56,
          ease: "back.out(2.15)",
          clearProps: "--node-scale,filter"
        }
      );
    }

    function animateActiveRoute() {
      if (!motion.enabled) return;
      const activeEdge = edgeSvg.querySelector(".edge.active");
      const flowEdge = edgeSvg.querySelector(".edge-flow");
      if (activeEdge) {
        gsap.fromTo(
          activeEdge,
          { opacity: 0.35, strokeWidth: 1.2 },
          { opacity: 1, strokeWidth: 1.9, duration: 0.52, ease: "power2.out", clearProps: "opacity,strokeWidth" }
        );
      }
      if (flowEdge) {
        gsap.fromTo(
          flowEdge,
          { opacity: 0.15 },
          { opacity: 0.9, duration: 0.62, ease: "sine.out", clearProps: "opacity" }
        );
      }
    }

    function animateCurrentMessage(id, type) {
      if (!motion.enabled || !id) return;
      const targets = [messageName, messageCount, messageText].filter((element) => element && !element.hidden);
      gsap.killTweensOf(targets);
      gsap.fromTo(
        targets,
        { autoAlpha: 0.72 },
        { autoAlpha: 1, duration: 0.24, ease: "power2.out", clearProps: "opacity,visibility" }
      );
    }

    function runMotionEffects({ currentVisibleIds, previousVisibleIds, previousActiveIds, previousSelectedId }) {
      if (!motion.enabled) return;

      const pending = motion.pending || {};
      const activeIds = new Set(activePath());
      const activeChanged = activeIds.size !== previousActiveIds.size
        || [...activeIds].some((id) => !previousActiveIds.has(id));
      const selectedChanged = selectedNodeId !== previousSelectedId;

      if (!motion.initialized) {
        const initialNodes = currentVisibleIds
          .map((id) => nodeLayer.querySelector(escapedDataSelector("data-node", id)))
          .filter(Boolean);
        gsap.timeline({ defaults: { ease: "power2.out" } })
          .fromTo(".message-card", { y: 18, autoAlpha: 0 }, { y: 0, autoAlpha: 1, duration: 0.46, clearProps: "transform,opacity,visibility" }, 0)
          .fromTo(
            initialNodes,
            { "--node-scale": 0.82, "--node-opacity": 0 },
            {
              "--node-scale": 1,
              "--node-opacity": (index, target) => target.classList.contains("inactive") ? 0.2 : 1,
              duration: 0.58,
              stagger: { amount: 0.48, from: "center" },
              clearProps: "--node-scale,--node-opacity"
            },
            0.08
          );
        motion.initialized = true;
      }

      if (selectedChanged || pending.type === "select" || pending.type === "anchor") {
        animateNodePulse(selectedNodeId);
        animateCurrentMessage(selectedNodeId, pending.type);
      }
      if (activeChanged || pending.type === "select" || pending.type === "anchor") {
        animateActiveRoute();
      }
    }

    function showTooltip(nodeId, target) {
      const node = nodes[nodeId];
      if (!node || !target) return;
      tooltipAvatar.className = `tooltip__avatar ${node.type}`;
      tooltipLabel.textContent = speakerName(node);
      tooltipBody.textContent = node.text;
      tooltipAnchorBtn.dataset.node = nodeId;
      tooltip.classList.add("show");
      tooltip.setAttribute("aria-hidden", "false");

      const rect = target.getBoundingClientRect();
      const tipWidth = tooltip.offsetWidth;
      const tipHeight = tooltip.offsetHeight;
      const centerX = rect.left + rect.width / 2;
      const gap = 26;
      const arrowSize = 10;
      const arrowOverlap = 4;

      let placement = "top";
      let top = rect.top - tipHeight - gap;
      if (top < 12) {
        placement = "bottom";
        top = rect.bottom + gap;
      }
      const left = clamp(centerX - tipWidth / 2, 12, window.innerWidth - tipWidth - 12);

      tooltip.style.left = `${left}px`;
      tooltip.style.top = `${top}px`;

      const arrowX = clamp(centerX - left, 20, tipWidth - 20) - arrowSize / 2;
      tooltipArrow.style.left = `${arrowX}px`;
      tooltipArrow.classList.toggle("is-top", placement === "top");
      tooltipArrow.classList.toggle("is-bottom", placement !== "top");
      if (placement === "top") {
        tooltipArrow.style.top = "";
        tooltipArrow.style.bottom = `-${arrowOverlap}px`;
      } else {
        tooltipArrow.style.bottom = "";
        tooltipArrow.style.top = `-${arrowOverlap}px`;
      }

      if (motion.enabled) {
        gsap.killTweensOf(tooltip);
        gsap.fromTo(
          tooltip,
          { y: 6, scale: 0.985, autoAlpha: 0 },
          { y: 0, scale: 1, autoAlpha: 1, duration: 0.18, ease: "power2.out", clearProps: "transform,opacity,visibility" }
        );
      }
    }

    function hideTooltip() {
      window.clearTimeout(tooltipHideTimer);
      tooltip.classList.remove("show");
      tooltip.setAttribute("aria-hidden", "true");
    }

    function scheduleTooltipHide() {
      window.clearTimeout(tooltipHideTimer);
      tooltipHideTimer = window.setTimeout(() => {
        if (!tooltip.matches(":hover")) hideTooltip();
      }, 90);
    }

    function selectConversationNode(id, options = {}) {
      activeLeafId = id;
      selectedNodeId = id;
      setPendingMotion(options.fromAnchor ? "anchor" : "select", { id });
      render();
      if (options.showTooltipTarget) showTooltip(id, options.showTooltipTarget);
    }

    function render() {
      const previousVisibleIds = motion.previousVisibleIds;
      const previousActiveIds = motion.previousActiveIds;
      const previousSelectedId = motion.previousSelectedId;
      computeLayout();
      zoomValue.textContent = `${Math.round(treeZoom * 100)}%`;
      renderEdges();
      renderNodes();
      renderMessageCard();
      const currentVisibleIds = visibleNodes().map((node) => node.id);
      runMotionEffects({ currentVisibleIds, previousVisibleIds, previousActiveIds, previousSelectedId });
      motion.previousVisibleIds = new Set(currentVisibleIds);
      motion.previousActiveIds = new Set(activePath());
      motion.previousSelectedId = selectedNodeId;
      motion.pending = null;
    }

    function centerNode(id) {
      const node = nodePosition(id);
      viewport.scrollTo({
        left: Math.max(0, (layout.paddingX || 0) + node.x * treeZoom - viewport.clientWidth / 2),
        top: Math.max(0, (layout.paddingY || 0) + node.y * treeZoom - viewport.clientHeight / 2),
        behavior: "smooth"
      });
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function setTreeZoom(nextZoom, origin = {}) {
      const previousZoom = treeZoom;
      const zoom = clamp(nextZoom, 0.55, 1.7);
      if (Math.abs(zoom - previousZoom) < 0.001) return;
      userChangedZoom = true;

      const rect = viewport.getBoundingClientRect();
      const localX = Number.isFinite(origin.clientX) ? origin.clientX - rect.left : viewport.clientWidth / 2;
      const localY = Number.isFinite(origin.clientY) ? origin.clientY - rect.top : viewport.clientHeight / 2;
      const previousPaddingX = layout.paddingX || 0;
      const previousPaddingY = layout.paddingY || 0;
      const contentX = (viewport.scrollLeft + localX - previousPaddingX) / previousZoom;
      const contentY = (viewport.scrollTop + localY - previousPaddingY) / previousZoom;

      treeZoom = zoom;
      zoomValue.textContent = `${Math.round(treeZoom * 100)}%`;
      computeLayout();
      viewport.scrollLeft = Math.max(0, (layout.paddingX || 0) + contentX * treeZoom - localX);
      viewport.scrollTop = Math.max(0, (layout.paddingY || 0) + contentY * treeZoom - localY);
      if (motion.enabled) {
        gsap.fromTo(zoomValue, { scale: 0.9, autoAlpha: 0.7 }, { scale: 1, autoAlpha: 1, duration: 0.22, ease: "power2.out", clearProps: "transform,opacity,visibility" });
      }
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 1800);
    }

    document.getElementById("zoomOutBtn").addEventListener("click", () => setTreeZoom(treeZoom / 1.16));
    document.getElementById("zoomInBtn").addEventListener("click", () => setTreeZoom(treeZoom * 1.16));
    document.getElementById("zoomResetBtn").addEventListener("click", () => setTreeZoom(1));
    document.querySelector(".close-button").addEventListener("click", () => showToast("Demo 中关闭按钮仅展示入口形态。"));
    tooltip.addEventListener("mouseenter", () => window.clearTimeout(tooltipHideTimer));
    tooltip.addEventListener("mouseleave", scheduleTooltipHide);
    tooltipAnchorBtn.addEventListener("click", () => {
      const id = tooltipAnchorBtn.dataset.node;
      if (!id) return;
      selectConversationNode(id, { fromAnchor: true });
      hideTooltip();
    });

    function wheelDeltaInPixels(event) {
      const scale = event.deltaMode === WheelEvent.DOM_DELTA_LINE
        ? 16
        : event.deltaMode === WheelEvent.DOM_DELTA_PAGE
          ? viewport.clientHeight
          : 1;
      return {
        x: event.deltaX * scale,
        y: event.deltaY * scale
      };
    }

    viewport.addEventListener("wheel", (event) => {
      event.preventDefault();
      hideTooltip();
      const delta = wheelDeltaInPixels(event);
      if (event.ctrlKey || event.metaKey) {
        const zoomFactor = Math.exp(-delta.y * 0.002);
        setTreeZoom(treeZoom * zoomFactor, event);
        return;
      }
      viewport.scrollLeft += delta.x;
      viewport.scrollTop += delta.y;
    }, { passive: false });
    viewport.addEventListener("pointerdown", (event) => {
      if (event.target.closest?.("button")) return;
      hideTooltip();
      panGesture = {
        pointerId: event.pointerId,
        clientX: event.clientX,
        clientY: event.clientY,
        scrollLeft: viewport.scrollLeft,
        scrollTop: viewport.scrollTop
      };
      viewport.classList.add("is-panning");
      viewport.setPointerCapture?.(event.pointerId);
    });
    viewport.addEventListener("pointermove", (event) => {
      if (!panGesture || panGesture.pointerId !== event.pointerId) return;
      viewport.scrollLeft = panGesture.scrollLeft - (event.clientX - panGesture.clientX);
      viewport.scrollTop = panGesture.scrollTop - (event.clientY - panGesture.clientY);
    });
    function endPan(event) {
      if (!panGesture || panGesture.pointerId !== event.pointerId) return;
      panGesture = null;
      viewport.classList.remove("is-panning");
    }
    viewport.addEventListener("pointerup", endPan);
    viewport.addEventListener("pointercancel", endPan);
    window.addEventListener("resize", () => {
      if (userChangedZoom) return;
      initialZoomApplied = false;
      render();
      centerNode(selectedNodeId);
    });
    nodeLayer.addEventListener("mouseover", (event) => {
      const nodeButton = event.target.closest?.("[data-node]");
      if (nodeButton) showTooltip(nodeButton.dataset.node, nodeButton);
    });
    nodeLayer.addEventListener("mouseout", (event) => {
      const nodeButton = event.target.closest?.("[data-node]");
      const next = event.relatedTarget?.closest?.("[data-node]");
      if (nodeButton && nodeButton !== next && !tooltip.contains(event.relatedTarget)) scheduleTooltipHide();
    });
    nodeLayer.addEventListener("focusin", (event) => {
      const nodeButton = event.target.closest?.("[data-node]");
      if (nodeButton) showTooltip(nodeButton.dataset.node, nodeButton);
    });
    nodeLayer.addEventListener("focusout", (event) => {
      if (tooltip.contains(event.relatedTarget)) return;
      hideTooltip();
    });
    nodeLayer.addEventListener("click", (event) => {
      const nodeButton = event.target.closest?.("[data-node]");
      if (!nodeButton) return;
      const id = nodeButton.dataset.node;
      selectConversationNode(id);
      const fresh = nodeLayer.querySelector(`[data-node="${id}"]`);
      if (fresh) showTooltip(id, fresh);
    });
    viewport.addEventListener("scroll", hideTooltip, { passive: true });

    render();
    window.requestAnimationFrame(() => centerNode("root"));
  </script>
</body>
</html>
